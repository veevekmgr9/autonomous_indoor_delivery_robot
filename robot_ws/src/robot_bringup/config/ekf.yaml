ekf_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_tf: true
    
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Wheel Odometry Settings (Example using /odom)
    odom0: /odom
    odom0_config: [true,  true,  false, # X, Y, Z
                   false, false, true,  # Roll, Pitch, Yaw
                   true,  true,  false, # VX, VY, VZ
                   false, false, false, # V-Roll, V-Pitch, V-Yaw
                   false, false, false] # Accel
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false

    # IMU Settings (Example using /imu/data)
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, true,  # Yaw is essential for heading
                  false, false, false,
                  true,  true,  false, # Angular velocity
                  false, false, false]
    imu0_queue_size: 10
    imu0_nodelay: false
    imu0_differential: false
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true