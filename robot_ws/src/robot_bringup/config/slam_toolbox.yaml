### slam_toolbox config — tuned for RPLidar A1, indoor corridors
### Mode: async mapping (you drive manually, it builds the map)
### After mapping: save map, then switch to localization mode

slam_toolbox:
  ros__parameters:

    # ---------------------------------------------------------------
    # Plugin & solver
    # ---------------------------------------------------------------
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ---------------------------------------------------------------
    # Frames
    # ---------------------------------------------------------------
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint

    # IMPORTANT: use the EKF-filtered odometry, not raw /odom
    scan_topic: /scan
    use_map_saver: true
    mode: mapping              # change to 'localization' after you have a map

    # ---------------------------------------------------------------
    # Scan matching — tuned for RPLidar A1 (8m range, 5-6Hz effective)
    # ---------------------------------------------------------------
    map_update_interval: 2.0       # seconds between map updates (lower = slower Pi)
    resolution: 0.05               # 5cm per cell — good for corridors
    max_laser_range: 6.0           # A1 is rated 12m but indoor readings degrade; 6m is reliable
    minimum_time_interval: 0.3     # don't process scans faster than this (saves CPU on Pi 4)
    transform_timeout: 0.5
    tf_buffer_duration: 10.0

    # Scan matching thresholds
    # How far robot must move/rotate before a new scan is processed
    minimum_travel_distance: 0.05  # 5cm — catches slow careful driving
    minimum_travel_heading: 0.05   # ~3 degrees

    # ---------------------------------------------------------------
    # Loop closure — how aggressively it corrects accumulated drift
    # ---------------------------------------------------------------
    do_loop_closing: true
    loop_search_maximum_distance: 3.0   # metres — small indoor space
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45
    loop_match_maximum_variance_coarse: 3.0
    loop_match_maximum_variance_fine: 0.15

    # ---------------------------------------------------------------
    # Correlation parameters — scan-to-scan matching quality
    # ---------------------------------------------------------------
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349     # 0.2 degrees
    coarse_search_angle_offset: 0.349     # 20 degrees
    coarse_angle_resolution: 0.0349       # 2 degrees
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true

    # ---------------------------------------------------------------
    # Serialization (map saving)
    # ---------------------------------------------------------------
    map_file_name: /home/ubuntu/maps/indoor_map
    map_start_at_dock: true